services:
  frontend:
    build: ./services/frontend
    ports:
      - "8080:8080"
    environment:
      PORT: "8080"
      GATEWAY_URL: "http://gateway:8081"
    depends_on:
      - gateway

  gateway:
    build: ./services/gateway
    environment:
      PORT: "8081"
      CATALOG_URL: "http://catalog:8082"
      CART_URL: "http://cart:8083"
      ORDER_URL: "http://order:8084"
    depends_on:
      - catalog
      - cart
      - order

  catalog:
    build: ./services/catalog
    environment:
      PORT: "8082"

  cart:
    build: ./services/cart
    environment:
      PORT: "8083"
      CATALOG_URL: "http://catalog:8082"
    depends_on:
      - catalog


  order:
    build: ./services/order
    environment:
      PORT: "8084"
      CART_URL: "http://cart:8083"
