{{- $ns := .Values.namespace -}}
{{- range $name, $svc := .Values.services }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ $name }}
  namespace: {{ $ns }}
  labels:
    app.kubernetes.io/name: {{ $name }}
    {{- include "ecommerce.labels" $ | nindent 4 }}
spec:
  replicas: {{ $svc.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ $name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ $name }}
        {{- include "ecommerce.labels" $ | nindent 8 }}
    spec:
      {{- if $.Values.imagePullSecrets }}
      imagePullSecrets:
      {{- range $.Values.imagePullSecrets }}
      - name: {{ . | quote }}
      {{- end }}

      {{- end }}
      containers:
      - name: {{ $name }}
        image: "{{ $svc.image.repository }}:{{ $svc.image.tag }}"
        imagePullPolicy: {{ $svc.image.pullPolicy }}
        ports:
        - containerPort: {{ $svc.port }}
        env:
        {{- range $k, $v := $svc.env }}
        - name: {{ $k }}
          value: {{ $v | quote }}
        {{- end }}
        readinessProbe:
          httpGet:
            path: /ready
            port: {{ $svc.port }}
          initialDelaySeconds: 2
          periodSeconds: 5
        livenessProbe:
          httpGet:
            path: /healthz
            port: {{ $svc.port }}
          initialDelaySeconds: 5
          periodSeconds: 10
---
{{- end }}
