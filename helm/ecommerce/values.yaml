namespace: ecommerce

imagePullSecrets:
  - gitlab-registry

services:
  frontend:
    replicas: 1
    port: 8080
    image:
      repository: registry.gitlab.com/devops-cloud1891308/projeto-devops/frontend
      tag: "0.1.0"
      pullPolicy: IfNotPresent
    env:
      PORT: "8080"
      GATEWAY_URL: "http://gateway:8081"

  gateway:
    replicas: 1
    port: 8081
    image:
      repository: registry.gitlab.com/devops-cloud1891308/projeto-devops/gateway
      tag: "0.1.0"
      pullPolicy: IfNotPresent
    env:
      PORT: "8081"
      CATALOG_URL: "http://catalog:8082"
      CART_URL: "http://cart:8083"
      ORDER_URL: "http://order:8084"

  catalog:
    replicas: 1
    port: 8082
    image:
      repository: registry.gitlab.com/devops-cloud1891308/projeto-devops/catalog
      tag: "0.1.0"
      pullPolicy: IfNotPresent
    env:
      PORT: "8082"

  cart:
    replicas: 1
    port: 8083
    image:
      repository: registry.gitlab.com/devops-cloud1891308/projeto-devops/cart
      tag: "0.1.0"
      pullPolicy: IfNotPresent
    env:
      PORT: "8083"
      CATALOG_URL: "http://catalog:8082"

  order:
    replicas: 1
    port: 8084
    image:
      repository: registry.gitlab.com/devops-cloud1891308/projeto-devops/order
      tag: "0.1.0"
      pullPolicy: IfNotPresent
    env:
      PORT: "8084"
      CART_URL: "http://cart:8083"

ingress:
  enabled: true
  className: nginx
  host: ""   # vazio = acessa por IP externo sem domínio
  path: /
  pathType: Prefix
  annotations: {}